<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* MENU NGANG */
        .menu_ngang{
            list-style: none;
            background-color: aquamarine;
            padding: 0;
            display: flex
        }
        .menu_ngang li {
            margin-left: 1px;
            padding: 10px;
            background-color: aquamarine;
        }
        .menu_ngang li:hover{
            background-color: orange;
            color: white;
            font-weight: bolder;
            border-radius: 5px;
        } 
        /* MENU DOC */
        .menu_doc{
            list-style: none;
            background-color: rgb(23, 165, 221);
            padding: 0;
            display: flex;
            flex-direction: column;
            width: 250px;
        }
        .menu_doc li{
            margin: 0;
            padding: 10px; 
            border: solid white 1px ;
        }
        .menu_doc li:hover{
            background-color: rgb(108, 199, 230);
            font-style:italic ;
        }
    </style>
</head>
<body>
<div>
    <ul class="menu_ngang">
        <li>Trang chủ</li>
        <li>Giới thiệu</li>
        <li>Sản phẩm</li>
        <li>Dịch vụ</li>
        <li>Liên hệ</li>
    </ul>
    <ul class="menu_doc">
        <li>Trang chủ</li>
        <li>Giới thiệu</li>
        <li>Sản phẩm</li>
        <li>Dịch vụ</li>
        <li>Liên hệ</li>
    </ul>
</div>
</body>
</html>
